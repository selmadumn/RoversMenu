<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rovers Irish Pub</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="home-page">

    <!-- Dil Seçici -->
    <div class="language-selector">

        <button type="button" id="languageButton">
            🌐 <span id="selectedLanguage">Türkçe</span> ▼
        </button>

        <div id="languageList" class="language-list">

            <div class="language-item" data-lang="tr">🇹🇷 Türkçe</div>
            <div class="language-item" data-lang="en">🇬🇧 English</div>
            <div class="language-item" data-lang="de">🇩🇪 Deutsch</div>
            <div class="language-item" data-lang="fr">🇫🇷 Français</div>
            <div class="language-item" data-lang="it">🇮🇹 Italiano</div>
            <div class="language-item" data-lang="ru">🇷🇺 Русский</div>
            <div class="language-item" data-lang="fa">🇮🇷 فارسی</div>
            <div class="language-item" data-lang="es">🇪🇸 Español</div>

        </div>

    </div>

    <!-- Ana Sayfa -->
    <div class="home-overlay">

        <button id="enterButton" type="button" onclick="window.location.href='menu.html'">
            MENÜYE GİR
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
