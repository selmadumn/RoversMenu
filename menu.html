<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rovers Menü</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="menu-page">

    <!-- Arka Plan -->
    <div class="background-overlay"></div>

    <!-- Logo -->
    <div class="logo-bg">
        <img src="images/logo.jpeg" alt="Rovers Logo">
    </div>

    <!-- Menü -->
    <div class="container">

        <h1 id="title">ROVERS IRISH PUB</h1>

        <p id="subtitle">Dijital Menü</p>

        <div class="menu-grid">

            <a href="#" class="card">
                <div class="icon">🍕</div>
                <span id="pizza">Pizzalar</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🍔</div>
                <span id="burger">Burgerler</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🍝</div>
                <span id="pasta">Makarnalar</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🥩</div>
                <span id="main">Ana Yemekler</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🥗</div>
                <span id="salad">Salatalar</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🍟</div>
                <span id="snack">Atıştırmalıklar</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🍺</div>
                <span id="beer">Biralar</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🍷</div>
                <span id="wine">Şaraplar</span>
            </a>

            <a href="#" class="card">
                <div class="icon">🍸</div>
                <span id="cocktail">Kokteyller</span>
            </a>

            <a href="#" class="card">
                <div class="icon">☕</div>
                <span id="coffee">Kahveler</span>
            </a>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
